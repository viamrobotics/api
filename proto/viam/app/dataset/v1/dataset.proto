syntax = "proto3";

package viam.app.dataset.v1;

import "google/protobuf/timestamp.proto";

option go_package = "go.viam.com/api/app/dataset/v1";

// DatasetService is used to manage datasets.
service DatasetService {
  // CreateDataset makes a new dataset.
  rpc CreateDataset(CreateDatasetRequest) returns (CreateDatasetResponse);

  // DeleteDatasets deletes an existing dataset.
  rpc DeleteDataset(DeleteDatasetRequest) returns (DeleteDatasetResponse);

  // RenameDataset modifies the name of an existing dataset.
  rpc RenameDataset(RenameDatasetRequest) returns (RenameDatasetResponse);

  // ListDatasetsByOrganizationID lists all of the datasets for an organization.
  rpc ListDatasetsByOrganizationID(ListDatasetsByOrganizationIDRequest) returns (ListDatasetsByOrganizationIDResponse);

  // ListDatasetsByIDs lists all of the datasets specified by the given dataset IDs.
  rpc ListDatasetsByIDs(ListDatasetsByIDsRequest) returns (ListDatasetsByIDsResponse);

  // MergeDatasets merges multiple datasets into a new dataset.
  rpc MergeDatasets(MergeDatasetsRequest) returns (MergeDatasetsResponse);

  // StartSequenceDatasetExport kicks off an async export of all data for a sequence dataset.
  rpc StartSequenceDatasetExport(StartSequenceDatasetExportRequest) returns (StartSequenceDatasetExportResponse);

  // GetSequenceDatasetExport returns the current status of an export job.
  rpc GetSequenceDatasetExport(GetSequenceDatasetExportRequest) returns (GetSequenceDatasetExportResponse);
}

// DatasetType describes the kind of membership a dataset stores.
// buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
enum DatasetType {
  // DATASET_TYPE_BINARY_DATA is a dataset whose members are individual binary data objects (frames).
  // This is the default for datasets created without an explicit type, including all pre-existing
  // datasets.
  DATASET_TYPE_BINARY_DATA = 0;
  // DATASET_TYPE_SEQUENCE_DATA is a dataset whose members are sequences. Binary-data writes
  // (AddBinaryDataToDatasetByIDs, AddBinaryDataToDatasetByFilter) are rejected against datasets
  // of this type; sequences are added/removed via AddSequencesToDataset / RemoveSequencesFromDataset.
  DATASET_TYPE_SEQUENCE_DATA = 1;
}

// SequenceDatasetExportStatus is the lifecycle state of an export job.
enum SequenceDatasetExportStatus {
  SEQUENCE_DATASET_EXPORT_STATUS_RUNNING = 0;
  // COMPLETED — Parquet file is uploaded; download_url is set.
  SEQUENCE_DATASET_EXPORT_STATUS_COMPLETED = 1;
  // FAILED — terminal; error_message describes the cause.
  SEQUENCE_DATASET_EXPORT_STATUS_FAILED = 2;
}

// Dataset stores the metadata of a dataset.
message Dataset {
  string id = 1;
  string name = 2;
  string organization_id = 3;
  google.protobuf.Timestamp time_created = 4;
  // type is the membership kind of this dataset. Immutable after creation; defaults to
  // DATASET_TYPE_BINARY_DATA when unset (including for pre-existing datasets).
  DatasetType type = 5;
}

// CreateDatasetRequest defines the name and organization ID of a dataset.
message CreateDatasetRequest {
  string name = 1;
  string organization_id = 2;
  // type is the membership kind for the new dataset. Defaults to DATASET_TYPE_BINARY_DATA when unset.
  optional DatasetType type = 3;
}

// CreateDatasetResponse returns the dataset ID of the created dataset.
message CreateDatasetResponse {
  string id = 1;
}

// DeleteDatasetRequest deletes the dataset specified by the dataset ID.
message DeleteDatasetRequest {
  string id = 1;
}

message DeleteDatasetResponse {}

// RenameDatasetRequest applies the new name to the dataset specified by the dataset ID.
message RenameDatasetRequest {
  string id = 1;
  string name = 2;
}

message RenameDatasetResponse {}

// ListDatasetsByOrganizationIDRequest requests all of the datasets for an organization.
message ListDatasetsByOrganizationIDRequest {
  string organization_id = 1;
}

// ListDatasetsByOrganizationIDResponse returns all the dataset metadata for the organization.
message ListDatasetsByOrganizationIDResponse {
  repeated Dataset datasets = 1;
}

// ListDatasetsByIDsRequest requests all of the datasets by their dataset IDs.
message ListDatasetsByIDsRequest {
  repeated string ids = 1;
}

// ListDatasetsByIDsResponse returns all the dataset metadata for the associated dataset IDs.
message ListDatasetsByIDsResponse {
  repeated Dataset datasets = 1;
}

// MergeDatasetsRequest merges multiple datasets specified by their dataset IDs into a new dataset.
message MergeDatasetsRequest {
  repeated string dataset_ids = 1;
  string name = 2;
  string organization_id = 3;
}

// MergeDatasetsResponse returns the dataset ID of the newly created merged dataset.
message MergeDatasetsResponse {
  string dataset_id = 1;
}

// StartSequenceDatasetExportRequest specifies the sequence dataset to export.
message StartSequenceDatasetExportRequest {
  string dataset_id = 1;
}

// StartSequenceDatasetExportResponse returns the job_id to poll with
message StartSequenceDatasetExportResponse {
  string job_id = 1;
}

// GetSequenceDatasetExportRequest looks up an export job by its job_id.
message GetSequenceDatasetExportRequest {
  string job_id = 1;
}

// GetSequenceDatasetExportResponse reports the current status of an export
// job. download_url and expires_at are set only when status is COMPLETED;
// error_message is set only when status is FAILED.
message GetSequenceDatasetExportResponse {
  string job_id = 1;
  SequenceDatasetExportStatus status = 2;
  // Short-lived (e.g. 1h) signed URL for direct download from backing
  // storage. Empty unless status is COMPLETED.
  string download_url = 3;
  // When download_url stops working. Empty unless status is COMPLETED.
  google.protobuf.Timestamp expires_at = 4;
  // Human-readable cause; empty unless status is FAILED.
  string error_message = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp completed_at = 7;
}
